services:
  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - 8080:8080
    volumes:
      - .:/var/www
    working_dir: /var/www
    container_name: charity-app
    command: ["sh", "entrypoint.sh"]
    environment:
      - MONGODB_URI=mongodb://db:27017
      - MONGODB_DB=charity
    depends_on:
      db:
        condition: service_healthy

volumes:
  mongo_data:
