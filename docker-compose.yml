services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: charity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - 8080:8080
    volumes:
      - .:/var/www
    working_dir: /var/www
    container_name: charity-app
    command: ["sh", "entrypoint.sh"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=charity
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
